name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true # Fix: Automatically enables Pages for the repository
          
      - name: Fazer upload dos arquivos estáticos
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webapp' # Improvement: Only uploads the necessary web frontend files
          
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
